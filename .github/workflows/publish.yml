name: Publish NPM, Maven

on:
  push:
    tags:
      - 'v*'
jobs:
  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Extract Tag
        id: tag
        uses: aaronbarnaby/get-tag@v1.0.0
        with:
          without_prefix_v: true # Remove prefix `v` from tag

      - name: Publish MAVEN
        run: mvn -q  deploy -DskipTests   -Drevision=${{ steps.tag.outputs.tag }}  -P publish
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE_KEY }}




